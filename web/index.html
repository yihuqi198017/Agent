<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>智能医疗助手 MVP</title>
  <style>
    :root {
      --bg: #f5f8fb;
      --card: #ffffff;
      --text: #153047;
      --muted: #5a7287;
      --primary: #007c91;
      --danger: #b12333;
      --border: #d8e3ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #d9edf5, var(--bg) 50%);
    }
    .wrap {
      max-width: 920px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0, 42, 66, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: var(--muted); margin-top: 0; }
    textarea, input, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    button {
      margin-top: 12px;
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }
    .result {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: #3d6f97;
    }
    .badge.emergency { background: var(--danger); }
    .badge.urgent { background: #d36700; }
    .badge.routine { background: #2d7f45; }
    .badge.self_care { background: #3d6f97; }
    ul { padding-left: 20px; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>智能医疗助手（分诊版）</h1>
      <p>仅用于健康科普，不替代医生诊疗。</p>

      <label>症状描述</label>
      <textarea id="symptom" rows="5" placeholder="例如：发热两天，最高 38.5℃，伴轻微咳嗽"></textarea>

      <div class="grid">
        <div>
          <label>年龄</label>
          <input id="age" type="number" min="0" max="120" placeholder="可选" />
        </div>
        <div>
          <label>性别</label>
          <select id="sex">
            <option value="">未提供</option>
            <option value="male">男</option>
            <option value="female">女</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div>
          <label>体温</label>
          <input id="temperature" type="number" step="0.1" min="30" max="45" placeholder="可选" />
        </div>
      </div>

      <button id="submit">提交分诊</button>

      <div class="result" id="result" hidden>
        <div><span id="level" class="badge">-</span></div>
        <h3>建议</h3>
        <div id="advice"></div>
        <h3>风险标记</h3>
        <ul id="risks"></ul>
        <h3>引用</h3>
        <ul id="citations"></ul>
        <p id="disclaimer"></p>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    $("submit").addEventListener("click", async () => {
      const payload = {
        symptom_text: $("symptom").value.trim(),
        age: $("age").value ? Number($("age").value) : null,
        sex: $("sex").value || null,
        duration: null,
        temperature: $("temperature").value ? Number($("temperature").value) : null,
        pregnancy_status: null,
        history: [],
        current_medications: [],
        allergies: [],
        session_id: "web-demo"
      };

      if (!payload.symptom_text) {
        alert("请先输入症状描述");
        return;
      }

      const resp = await fetch("/api/v1/triage/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await resp.json();
      if (!resp.ok) {
        alert(data.detail || "请求失败");
        return;
      }

      $("result").hidden = false;
      $("level").textContent = data.triage_level;
      $("level").className = `badge ${data.triage_level}`;
      $("advice").textContent = data.advice;
      $("disclaimer").textContent = data.disclaimer;

      $("risks").innerHTML = "";
      (data.risk_flags || []).forEach((r) => {
        const li = document.createElement("li");
        li.textContent = `${r.label} (${r.severity}) ${r.matched_text || ""}`;
        $("risks").appendChild(li);
      });

      $("citations").innerHTML = "";
      (data.citations || []).forEach((c) => {
        const li = document.createElement("li");
        li.textContent = `[${c.index}] ${c.snippet}`;
        $("citations").appendChild(li);
      });
    });
  </script>
</body>
</html>
